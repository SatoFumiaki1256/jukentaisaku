<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>課題詳細 — 二級建築士製図</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#ebe7dc; --surface:#faf7f0; --ink:#1a1a1a; --inkSoft:#555;
      --rule:#d4cfc0; --red:#d3312a; --blue:#2952c8; --yellow:#f5c518;
    }
    body{background:var(--bg);color:var(--ink);font-family:'Noto Sans JP','Hiragino Sans',sans-serif;min-height:100dvh;}

    /* topbar */
    #topbar{
      position:sticky;top:0;height:48px;background:var(--ink);
      display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100;
    }
    .back-btn{color:#f0ede6;font-size:18px;background:none;border:none;cursor:pointer;padding:4px;}
    .topbar-title{font-family:'Archivo',sans-serif;font-size:12px;font-weight:900;color:#888;letter-spacing:.1em;text-transform:uppercase;}

    /* layout */
    #content{max-width:540px;margin:0 auto;padding:20px 16px 120px;}

    /* difficulty badge */
    .diff-badge{
      display:inline-block;font-size:9px;font-weight:900;
      padding:2px 8px;letter-spacing:.1em;text-transform:uppercase;
      font-family:'Archivo',sans-serif;margin-bottom:8px;
    }
    .diff-1{background:var(--blue);color:#fff;}
    .diff-2{background:var(--yellow);color:var(--ink);}
    .diff-3{background:var(--red);color:#fff;}

    /* title */
    #prob-title{font-family:'Archivo','Noto Sans JP',sans-serif;font-size:22px;font-weight:900;line-height:1.3;margin-bottom:16px;}

    /* stats grid */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;border:2px solid var(--ink);margin-bottom:16px;}
    .stat-cell{padding:10px 12px;border-right:2px solid var(--ink);border-bottom:2px solid var(--ink);}
    .stat-cell:nth-child(even){border-right:none;}
    .stat-cell:nth-last-child(-n+2){border-bottom:none;}
    .stat-label{font-size:9px;font-weight:700;color:var(--inkSoft);letter-spacing:.1em;text-transform:uppercase;font-family:'Archivo',sans-serif;margin-bottom:3px;}
    .stat-val{font-size:15px;font-weight:900;color:var(--ink);}

    /* section header */
    .sec-head{
      font-size:9px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;
      color:var(--inkSoft);font-family:'Archivo',sans-serif;
      border-bottom:2px solid var(--ink);padding-bottom:6px;margin:20px 0 10px;
    }

    /* site diagram */
    #site-diagram-wrap{background:var(--surface);border:2px solid var(--ink);padding:12px;margin-bottom:4px;display:flex;justify-content:center;}
    #site-diagram svg{width:min(180px,70vw);height:auto;}

    /* rooms list */
    .room-list{display:flex;flex-direction:column;gap:6px;}
    .room-item{
      background:var(--surface);border:1.5px solid var(--rule);
      padding:8px 12px;display:flex;align-items:baseline;gap:8px;
    }
    .room-name{font-size:13px;font-weight:700;}
    .room-floor{font-size:10px;color:var(--blue);font-weight:700;}
    .room-area{font-size:11px;color:var(--inkSoft);margin-left:auto;}
    .room-note{font-size:10px;color:var(--inkSoft);width:100%;margin-top:3px;}

    /* exterior */
    .ext-item{font-size:12px;padding:6px 12px;background:var(--surface);border:1.5px solid var(--rule);margin-bottom:5px;}

    /* saves */
    .save-slot{
      background:var(--surface);border:2px solid var(--ink);
      padding:12px 14px;margin-bottom:8px;
      display:flex;align-items:center;gap:10px;cursor:pointer;
      transition:background .12s;
    }
    .save-slot:hover{background:#fff;}
    .save-slot-info{flex:1;min-width:0;}
    .save-slot-title{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .save-slot-meta{font-size:10px;color:var(--inkSoft);margin-top:2px;}
    .save-slot-load{
      flex-shrink:0;padding:6px 14px;font-size:11px;font-weight:900;
      background:var(--ink);color:#f0ede6;border:none;cursor:pointer;
    }
    .save-slot-del{
      flex-shrink:0;padding:6px 10px;font-size:11px;font-weight:700;
      background:none;color:var(--red);border:1.5px solid var(--red);cursor:pointer;
    }

    /* action buttons (fixed bottom) */
    #action-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--bg);border-top:2px solid var(--ink);
      padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));
      display:flex;gap:10px;
    }
    .act-btn{
      flex:1;padding:14px;font-size:13px;font-weight:900;
      border:2px solid var(--ink);cursor:pointer;
      font-family:'Noto Sans JP',sans-serif;
    }
    #btn-new{background:var(--ink);color:#f0ede6;}
    #btn-free{background:var(--bg);color:var(--ink);flex:0 0 auto;padding:14px 18px;font-size:11px;}

    /* loading / error */
    #loading{text-align:center;padding:60px 20px;font-size:14px;color:var(--inkSoft);}
    #error{display:none;text-align:center;padding:60px 20px;font-size:14px;color:var(--red);}
  </style>
</head>
<body>

<div id="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="topbar-title">課題詳細</span>
</div>

<div id="content">
  <div id="loading">読み込み中...</div>
  <div id="error">課題データを読み込めませんでした</div>
  <div id="prob-body" style="display:none;">
    <div id="diff-badge" class="diff-badge"></div>
    <div id="prob-title"></div>

    <div class="stats-grid" id="stats-grid"></div>

    <div class="sec-head">敷地周辺図</div>
    <div id="site-diagram-wrap"><div id="site-diagram"></div></div>

    <div class="sec-head">要求室</div>
    <div class="room-list" id="room-list"></div>

    <div id="ext-section" style="display:none;">
      <div class="sec-head">外構条件</div>
      <div id="ext-list"></div>
    </div>

    <div class="sec-head">保存済みエスキス</div>
    <div id="saves-list">
      <p style="font-size:12px;color:var(--inkSoft);">この課題の保存済みエスキスはありません</p>
    </div>
  </div>
</div>

<div id="action-bar">
  <button class="act-btn" id="btn-new" onclick="startNew()">✏️ 新しくエスキスを始める</button>
  <button class="act-btn" id="btn-free" onclick="location.href='index.html'">← 戻る</button>
</div>

<script>
function escHtml(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

const ESKISU_SAVE_KEY = 'eskisu_saves';
const ADJ_COLORS = {
  '道路':'#E8A24A','宅地':'#9E9E9E','公園':'#4CAF50','緑地':'#66BB6A',
  '水路':'#42A5F5','河川':'#1E88E5','空地':'#FFF9C4','広場':'#B2EBF2',
  '里道':'#BCAAA4','線路敷':'#616161'
};

let problem = null;

// URL params
const params = new URLSearchParams(location.search);
const problemId = params.get('id');
if(!problemId){ location.href='index.html'; }

// Load problem
fetch('problems.json')
  .then(r=>r.json())
  .then(data=>{
    const p = data.find(x=>String(x.id)===String(problemId));
    if(!p){ document.getElementById('loading').style.display='none'; document.getElementById('error').style.display=''; return; }
    problem = p;
    renderProblem(p);
  })
  .catch(()=>{
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='';
  });

function renderProblem(p) {
  document.getElementById('loading').style.display='none';
  document.getElementById('prob-body').style.display='';
  document.title = p.title + ' — 課題詳細';

  // difficulty
  const diff = p.difficulty || 1;
  const diffEl = document.getElementById('diff-badge');
  diffEl.textContent = diff===1?'基礎':diff===2?'応用':'発展';
  diffEl.className = `diff-badge diff-${diff}`;

  // title
  document.getElementById('prob-title').textContent = p.title;

  // stats grid
  const siteW = p.siteW ? (p.siteW/1000).toFixed(1)+'m' : '—';
  const siteH = p.siteH ? (p.siteH/1000).toFixed(1)+'m' : '—';
  const stats = [
    ['構造',    p.structure  || '—'],
    ['用途地域', (p.zoning||'—').replace('地域','')],
    ['敷地',    `${siteW} × ${siteH}`],
    ['建蔽率',  p.coverage   ? p.coverage+'%' : '—'],
    ['容積率',  p.far        ? p.far+'%' : '—'],
    ['延床面積', p.floorAreaMin||p.floorAreaMax
      ? `${p.floorAreaMin||''}〜${p.floorAreaMax||''}㎡`
      : (p.floorArea ? p.floorArea+'㎡' : '—')],
  ];
  document.getElementById('stats-grid').innerHTML = stats.map(([k,v])=>
    `<div class="stat-cell"><div class="stat-label">${escHtml(k)}</div><div class="stat-val">${escHtml(v)}</div></div>`
  ).join('');

  // site diagram
  renderSiteDiagram(p);

  // rooms
  const roomList = document.getElementById('room-list');
  if(p.reqRooms && p.reqRooms.length){
    roomList.innerHTML = p.reqRooms.map(r=>`
      <div class="room-item" style="flex-wrap:wrap;">
        <span class="room-name">${escHtml(r.name)}</span>
        <span class="room-floor">${escHtml(r.floor||'')}</span>
        <span class="room-area">${escHtml(r.area||'')}</span>
        ${r.notes&&r.notes.length ? `<div class="room-note">${r.notes.map(n=>'・'+escHtml(n)).join('<br>')}</div>` : ''}
      </div>`).join('');
  } else {
    roomList.innerHTML = '<p style="font-size:12px;color:var(--inkSoft);">要求室データなし</p>';
  }

  // exterior
  if(p.exteriorConds && p.exteriorConds.length){
    document.getElementById('ext-section').style.display='';
    document.getElementById('ext-list').innerHTML = p.exteriorConds.map(e=>
      `<div class="ext-item">${escHtml(e.type)}${e.note?' — '+escHtml(e.note):''}</div>`
    ).join('');
  }

  // saves
  renderSaves(p.id);
}

function renderSiteDiagram(p) {
  const adj  = p.siteAdj || {};
  const siteW= p.siteW || 10920;
  const siteH= p.siteH || 13650;
  const S=140, B=28, I=S-B*2, cx=S/2, cy=S/2;
  const c = t => ADJ_COLORS[t] || '#9E9E9E';
  const adjL = (t,w) => t + (t==='道路'&&w?` ${w}m`:'');

  document.getElementById('site-diagram').innerHTML = `
  <svg viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
    <rect x="0"     y="0"     width="${S}"  height="${B}"  fill="${c(adj.N?.type||'宅地')}"/>
    <rect x="0"     y="${S-B}" width="${S}"  height="${B}"  fill="${c(adj.S?.type||'宅地')}"/>
    <rect x="0"     y="${B}"   width="${B}"  height="${I}"  fill="${c(adj.W?.type||'宅地')}"/>
    <rect x="${S-B}" y="${B}"   width="${B}"  height="${I}"  fill="${c(adj.E?.type||'宅地')}"/>
    <rect x="${B}" y="${B}" width="${I}" height="${I}" fill="#f5f0e8" stroke="#6495ED" stroke-width="1.5"/>
    <text x="${cx}" y="${B/2+4}" text-anchor="middle" font-size="8" fill="#222">${escHtml(adjL(adj.N?.type||'',adj.N?.width))}</text>
    <text x="${cx}" y="${S-B/2+4}" text-anchor="middle" font-size="8" fill="#222">${escHtml(adjL(adj.S?.type||'',adj.S?.width))}</text>
    <text x="${B/2}" y="${cy}" text-anchor="middle" font-size="8" fill="#222" transform="rotate(-90,${B/2},${cy})">${escHtml(adjL(adj.W?.type||'',adj.W?.width))}</text>
    <text x="${S-B/2}" y="${cy}" text-anchor="middle" font-size="8" fill="#222" transform="rotate(90,${S-B/2},${cy})">${escHtml(adjL(adj.E?.type||'',adj.E?.width))}</text>
    <text x="${cx}" y="${B-3}" text-anchor="middle" font-size="7" fill="#2952c8" font-weight="bold">${(siteW/1000).toFixed(2)}m</text>
    <text x="${B-3}" y="${cy}" text-anchor="middle" font-size="7" fill="#2952c8" font-weight="bold" transform="rotate(-90,${B-3},${cy})">${(siteH/1000).toFixed(2)}m</text>
    <text x="10" y="9" text-anchor="middle" font-size="7" fill="#6495ED" font-weight="bold">N</text>
    <polygon points="10,12 7,20 13,20" fill="#6495ED" opacity=".7"/>
  </svg>`;
}

function getAllSaves(){
  try{ return JSON.parse(localStorage.getItem(ESKISU_SAVE_KEY)||'[]'); }catch{ return []; }
}

function renderSaves(pid){
  const saves = getAllSaves().filter(s=> String(s.problemId)===String(pid));
  const el = document.getElementById('saves-list');
  if(!saves.length){
    el.innerHTML='<p style="font-size:12px;color:var(--inkSoft);">この課題の保存済みエスキスはありません</p>';
    return;
  }
  el.innerHTML = saves.map(s=>{
    const dt = new Date(s.savedAt);
    const ds = `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`;
    return `<div class="save-slot">
      <div class="save-slot-info">
        <div class="save-slot-title">${escHtml(s.title)}</div>
        <div class="save-slot-meta">${ds}</div>
      </div>
      <button class="save-slot-load" data-saveid="${escHtml(s.id)}">ロード</button>
      <button class="save-slot-del" data-delid="${escHtml(s.id)}">削除</button>
    </div>`;
  }).join('');

  el.querySelectorAll('[data-saveid]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      // selectedProblem をセットしてからapp.htmlへ遷移
      localStorage.setItem('selectedProblem', JSON.stringify({id:problem.id, title:problem.title}));
      location.href = `app.html?problemId=${encodeURIComponent(problem.id)}&saveId=${encodeURIComponent(btn.dataset.saveid)}`;
    });
  });
  el.querySelectorAll('[data-delid]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(!confirm('このエスキスを削除しますか？')) return;
      const saves = getAllSaves().filter(s=>s.id!==btn.dataset.delid);
      localStorage.setItem(ESKISU_SAVE_KEY, JSON.stringify(saves));
      renderSaves(problem.id);
    });
  });
}

function startNew(){
  if(!problem) return;
  // selectedProblem をセットしてからapp.htmlへ遷移（課題条件を読み込ませるため）
  localStorage.setItem('selectedProblem', JSON.stringify({id:problem.id, title:problem.title}));
  location.href = `app.html?problemId=${encodeURIComponent(problem.id)}`;
}
</script>
</body>
</html>
