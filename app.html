const ESKISU_SAVE_KEY = 'eskisu_saves';
const MAX_SAVES = 20;

function getAllSaves() {
  try { return JSON.parse(localStorage.getItem(ESKISU_SAVE_KEY) || '[]'); }
  catch(e) { return []; }
}

function getCurrentProblemInfo() {
  try {
    const sp = localStorage.getItem('selectedProblem');
    if(sp) { const p = JSON.parse(sp); return {id:p.id, title:p.title}; }
  } catch(e) {}
  return {id:null, title:null};
}

function saveCurrentWork(title) {
  const saves = getAllSaves();
  const prob  = getCurrentProblemInfo();
  const entry = {
    id: Date.now().toString(),
    title: title || 'エスキス',
    savedAt: new Date().toISOString(),
    problemId: prob.id,
    problemTitle: prob.title,
    rooms: JSON.parse(JSON.stringify(state.rooms)),
    walls: JSON.parse(JSON.stringify(state.walls)),
    site:  JSON.parse(JSON.stringify(state.site)),
  };
  saves.unshift(entry);
  if(saves.length > MAX_SAVES) saves.pop();
  localStorage.setItem(ESKISU_SAVE_KEY, JSON.stringify(saves));
  return entry;
}

function loadSavedWork(id) {
  const entry = getAllSaves().find(s => s.id === id);
  if(!entry) return;
  state.rooms    = entry.rooms || [];
  state.walls    = entry.walls || [];
  if(entry.site) state.site = {...state.site, ...entry.site};
  state.selected = null;
  saveHistory();
  fitViewToSite();
  render(); updateAreaOverlay(); refreshChecklistBadge();
  closeSavePanel();
  showSnack(`「${entry.title}」をロードしました`);
}

function deleteSave(id) {
  const saves = getAllSaves().filter(s => s.id !== id);
  localStorage.setItem(ESKISU_SAVE_KEY, JSON.stringify(saves));
  renderSaveList();
}

function renderSaveList() {
  const saves = getAllSaves();
  const list  = document.getElementById('save-list');
  if(!list) return;
  if(saves.length === 0) {
    list.innerHTML = '<p style="color:var(--sub);font-size:11px;text-align:center;padding:16px 0">保存されたエスキスはありません</p>';
    return;
  }
  list.innerHTML = saves.map(s => {
    const dt = new Date(s.savedAt);
    const ds = `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const sub = s.problemTitle ? `${ds} · ${escHtml(s.problemTitle)}` : ds;
    return `<div class="save-item" data-save-id="${escHtml(s.id)}">
      <div class="save-item-info">
        <div class="save-item-title">${escHtml(s.title)}</div>
        <div class="save-item-meta">${sub}</div>
      </div>
      <div class="save-item-actions">
        <button class="btn btn-p save-load-btn" style="padding:5px 10px;font-size:11px;" data-action="load" data-id="${escHtml(s.id)}">ロード</button>
        <button class="btn btn-d save-del-btn" style="padding:5px 8px;font-size:11px;" data-action="delete" data-id="${escHtml(s.id)}">削除</button>
      </div>
    </div>`;
  }).join('');
}

function openSavePanel() {
  const prob = getCurrentProblemInfo();
  const now  = new Date();
  const ds   = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('save-title-input').value =
    prob.title ? `${prob.title} ${ds}` : `エスキス ${ds}`;
  renderSaveList();
  document.getElementById('save-panel').classList.add('open');
  document.getElementById('overlay-blocker').classList.add('show');
}

function closeSavePanel() {
  document.getElementById('save-panel').classList.remove('open');
  // overlay-blocker は他パネルが開いていなければ非表示に
  const anyOpen = ['room-panel','cond-panel'].some(id =>
    document.getElementById(id).classList.contains('open'));
  if(!anyOpen) document.getElementById('overlay-blocker').classList.remove('show');
}

function exportImage() {
  const offscreen = document.createElement('canvas');
  offscreen.width  = canvas.width;
  offscreen.height = canvas.height;
  const oc = offscreen.getContext('2d');
  oc.fillStyle = '#f5f0e8';
  oc.fillRect(0,0,offscreen.width,offscreen.height);
  oc.drawImage(canvas, 0,0);
  const link = document.createElement('a');
  link.download = `esquisse_${Date.now()}.png`;
  link.href = offscreen.toDataURL('image/png');
  link.click();
  showSnack('画像を書き出しました');
}

document.getElementById('store-btn').onclick = openSavePanel;
document.getElementById('do-save-btn').onclick = () => {
  const title = document.getElementById('save-title-input').value.trim() || 'エスキス';
  saveCurrentWork(title);
  renderSaveList();
  showSnack(`「${title}」を保存しました`);
};
document.getElementById('do-img-btn').onclick = exportImage;

// 保存リストのボタン（delegated listener でXSS対策）
document.getElementById('save-list').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const id = btn.dataset.id;
  if(btn.dataset.action === 'load') {
    loadSavedWork(id);
  } else if(btn.dataset.action === 'delete') {
    if(confirm('このエスキスを削除しますか？')) deleteSave(id);
  }
});

// Guide line
document.getElementById('guide-btn').onclick = () => {
  const cH = canvasWrap.clientHeight;
  const centerY = (cH / 2 - state.view.oy) / state.view.scale;
  state.guides.push({id: ++guideCounter, y: snap(centerY)});
  render();
  showSnack('ガイドラインを追加しました（ドラッグで移動・✕で削除）');
};

// Clear all
document.getElementById('clear-btn').onclick = () => {
  if(!confirm('全ての描画を消去しますか？')) return;
  saveHistory();
  state.walls = []; state.rooms = []; state.selected = null; state.drawing = null;
  render(); updateAreaOverlay();
};

// Undo / Redo
document.getElementById('undo-btn').onclick = undo;
document.getElementById('redo-btn').onclick = redo;

// ======================================================
// UTILITIES
// ======================================================
function fmtMm(mm) {
  const m = Math.abs(mm);
  if(m >= 1000) return (m/1000).toFixed(2).replace(/0+$/,'').replace(/\.$/,'') + 'm';
  return Math.round(m) + 'mm';
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function darken(hex) {
  const r = Math.max(0,parseInt(hex.slice(1,3),16)-60);
  const g = Math.max(0,parseInt(hex.slice(3,5),16)-60);
  const b = Math.max(0,parseInt(hex.slice(5,7),16)-60);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function var_accent() { return '#6495ED'; }

let snackTimer;
function showSnack(msg) {
  const el = document.getElementById('snack');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(snackTimer);
  snackTimer = setTimeout(()=>el.classList.remove('show'), 2000);
}

const dimtip = document.getElementById('dimtip');
function showDimTip(px, py, text) {
  dimtip.style.display = 'block';
  dimtip.style.left = (px+10)+'px';
  dimtip.style.top  = (py-24)+'px';
  dimtip.textContent = text;
}
function hideDimTip() { dimtip.style.display='none'; }
function updateDimTip(px, py) {
  if(state.tool==='wall'||state.tool==='room') {
    const m = s2mm_snap(px, py);
    const p = mmToScreen(m.x, m.y);
    // show snap position
    if(!pointer.down) {
      dimtip.style.display='block';
      dimtip.style.left=(p.x+10)+'px';
      dimtip.style.top=(p.y-20)+'px';
      dimtip.textContent=`${fmtMm(m.x)}, ${fmtMm(m.y)}`;
    }
  } else hideDimTip();
}

// ======================================================
// INIT
// ======================================================
function init() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  canvasWrap = document.getElementById('canvas-wrap');

  // canvas イベントリスナーをここで登録
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('wheel', onWheel, {passive:false});
  canvas.addEventListener('touchstart', onTouchStart, {passive:false});
  canvas.addEventListener('touchmove', onTouchMove, {passive:false});
  canvas.addEventListener('touchend', onTouchEnd, {passive:false});
  canvas.addEventListener('click', onClick);

  buildRoomTypeGrid();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Center view on site
  fitViewToSite();

  // index.html のマイエスキスからロード要求があれば優先
  const loadSaveId = localStorage.getItem('load_save_id');
  if(loadSaveId) {
    localStorage.removeItem('load_save_id');
    const entry = getAllSaves().find(s => s.id === loadSaveId);
    if(entry) {
      state.rooms = entry.rooms || [];
      state.walls = entry.walls || [];
      if(entry.site) state.site = {...state.site, ...entry.site};
      fitViewToSite();
      saveHistory();
      render(); updateAreaOverlay(); refreshChecklistBadge();
      showSnack(`「${entry.title}」をロードしました`);
      return;
    }
  }

  // localStorage から選択された課題を読み込む
  const savedProblem = localStorage.getItem('selectedProblem');
  if(savedProblem) {
    try {
      loadProblem(JSON.parse(savedProblem));
    } catch(e) { /* ignore */ }
  }

  saveHistory(); // initial state
  render();
  updateZoomInfo();
  updateAreaOverlay();
  refreshChecklistBadge();
  const pname = savedProblem ? JSON.parse(savedProblem).title : null;
  showSnack(pname ? `📋 ${pname}` : '👆 壁・線ツールで描画開始、部屋ツールで部屋を配置');
}

function loadProblem(p) {
  // 敷地サイズ
  if(p.siteW) state.site.w = p.siteW;
  if(p.siteH) state.site.h = p.siteH;

  // フォームに反映
  if(p.title)          document.getElementById('c-title').value      = p.title;
  if(p.structure)      document.getElementById('c-struct').value     = p.structure;
  if(p.siteW)          document.getElementById('c-site-w').value     = p.siteW;
  if(p.siteH)          document.getElementById('c-site-d').value     = p.siteH;
  if(p.floorAreaMin != null) { const el = document.getElementById('c-floor-area-min'); if(el) el.value = p.floorAreaMin; }
  if(p.floorAreaMax != null) { const el = document.getElementById('c-floor-area-max'); if(el) el.value = p.floorAreaMax; }
  // backward compat: old single floorArea field
  if(p.floorArea != null && p.floorAreaMin == null) { const el = document.getElementById('c-floor-area-min'); if(el) el.value = p.floorArea; }
  if(p.coverage!=null) document.getElementById('c-coverage').value   = p.coverage;
  if(p.far!=null)      document.getElementById('c-far').value        = p.far;
  if(p.notes!=null)    document.getElementById('c-notes').value      = p.notes;
  if(p.zoning) {
    const zEl = document.getElementById('c-zoning');
    if(zEl) zEl.value = p.zoning;
  }

  // 敷地隣接
  if(p.siteAdj) {
    ['N','S','E','W'].forEach(d => {
      const a = p.siteAdj[d]; if(!a) return;
      const te = document.querySelector(`.adj-type[data-dir="${d}"]`);
      const we = document.querySelector(`.adj-width[data-dir="${d}"]`);
      const ot = document.querySelector(`.adj-opp-type[data-dir="${d}"]`);
      const ow = document.querySelector(`.adj-opp-width[data-dir="${d}"]`);
      if(te) te.value = a.type  || '宅地';
      if(we) we.value = a.width != null ? a.width : '';
      if(ot && a.opposite)      ot.value = a.opposite;
      if(ow && a.oppositeWidth) ow.value = a.oppositeWidth;
      updateOppRowVisibility(d); // 道路のときだけ対面行を表示
    });
  }
  drawSiteDiagram(); // siteW/siteH・隣接情報を更新した後に描画

  // 要求室リスト
  if(p.reqRooms && p.reqRooms.length) {
    document.getElementById('req-list').innerHTML = '';
    reqCounter = 0;
    p.reqRooms.forEach(r => addReqRow(r.name || '', r.floor || 'どちらでも', r.area || '', r.notes || []));
  }

  // 外構条件
  if(p.exteriorConds && p.exteriorConds.length) {
    document.getElementById('ext-list').innerHTML = '';
    extCounter = 0;
    p.exteriorConds.forEach(e => addExtRow(e.type || '駐車場', e.note || ''));
  }

  // パネルをロック（課題選択時）
  document.getElementById('cond-panel').classList.add('locked');

  // ビューを敷地にフィット
  fitViewToSite();

  // チェックリストを更新
  setTimeout(refreshChecklistBadge, 50); // DOM反映を待つ
}

// ── 課題の保存・ロード ─────────────────────────────────
const PROBLEM_SAVES_KEY = 'jukentaisaku_problem_saves';
const MAX_PROBLEM_SAVES = 10;

function getProblemSavesFromStorage() {
  try { return JSON.parse(localStorage.getItem(PROBLEM_SAVES_KEY)) || []; }
  catch { return []; }
}

function getConditionsFromDOM() {
  const adj = getAdjFromDOM();
  const reqItems = [];
  document.querySelectorAll('#req-list .req-item').forEach(item => {
    const name  = item.querySelector('[data-field="name"]')?.value  || '';
    const floor = item.querySelector('[data-field="floor"]')?.value || 'どちらでも';
    const area  = item.querySelector('[data-field="area"]')?.value  || '';
    const notes = [];
    item.querySelectorAll('.req-note-input').forEach(ni => { if(ni.value.trim()) notes.push(ni.value.trim()); });
    reqItems.push({name, floor, area, notes});
  });
  const extItems = [];
  document.querySelectorAll('#ext-list .ext-item').forEach(item => {
    const type = item.querySelector('.ext-type')?.value || '';
    const note = item.querySelector('.ext-note')?.value || '';
    extItems.push({type, note});
  });
  return {
    title:         document.getElementById('c-title')?.value        || '',
    structure:     document.getElementById('c-struct')?.value       || '',
    zoning:        document.getElementById('c-zoning')?.value       || '',
    siteW:         parseInt(document.getElementById('c-site-w')?.value)  || 10920,
    siteH:         parseInt(document.getElementById('c-site-d')?.value)  || 13650,
    coverage:      parseFloat(document.getElementById('c-coverage')?.value) || null,
    far:           parseFloat(document.getElementById('c-far')?.value)      || null,
    floorAreaMin:  parseFloat(document.getElementById('c-floor-area-min')?.value) || null,
    floorAreaMax:  parseFloat(document.getElementById('c-floor-area-max')?.value) || null,
    notes:         document.getElementById('c-notes')?.value        || '',
    siteAdj:       adj,
    reqRooms:      reqItems,
    exteriorConds: extItems,
  };
}

function saveProblemToStorage() {
  const conds = getConditionsFromDOM();
  const title = conds.title || '無題の課題';
  const saves = getProblemSavesFromStorage();
  const id    = Date.now().toString();
  saves.unshift({ id, title, savedAt: new Date().toISOString(), data: conds });
  if(saves.length > MAX_PROBLEM_SAVES) saves.length = MAX_PROBLEM_SAVES;
  localStorage.setItem(PROBLEM_SAVES_KEY, JSON.stringify(saves));
  showSnack(`「${title}」を保存しました`);
  renderSavedProblems();
}

function renderSavedProblems() {
  const list = document.getElementById('saved-problems-list');
  if(!list) return;
  const saves = getProblemSavesFromStorage();
  if(!saves.length) {
    list.innerHTML = '<p style="font-size:10px;color:var(--sub);text-align:center;padding:8px 0">保存した課題はありません</p>';
    return;
  }
  list.innerHTML = saves.map(s => `
    <div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);">
      <div style="flex:1;min-width:0;">
        <div style="font-size:11px;font-weight:bold;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(s.title)}</div>
        <div style="font-size:9px;color:var(--sub);">${new Date(s.savedAt).toLocaleDateString('ja-JP')}</div>
      </div>
      <button class="btn btn-s" style="font-size:10px;padding:3px 8px;" data-action="load-problem" data-id="${escHtml(s.id)}">ロード</button>
      <button class="btn btn-d" style="font-size:10px;padding:3px 8px;" data-action="del-problem" data-id="${escHtml(s.id)}">削除</button>
    </div>
  `).join('');
}

document.getElementById('saved-problems-list')?.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const id = btn.dataset.id;
  const saves = getProblemSavesFromStorage();
  if(btn.dataset.action === 'load-problem') {
    const s = saves.find(x => x.id === id);
    if(s) {
      // パネルロックを解除してからロード
      document.getElementById('cond-panel').classList.remove('locked');
      loadProblem(s.data);
      // ロック表示はしない（ユーザー作成課題は編集可能）
      document.getElementById('cond-panel').classList.remove('locked');
      showSnack(`「${escHtml(s.title)}」をロードしました`);
    }
  } else if(btn.dataset.action === 'del-problem') {
    const newSaves = saves.filter(x => x.id !== id);
    localStorage.setItem(PROBLEM_SAVES_KEY, JSON.stringify(newSaves));
    renderSavedProblems();
    showSnack('削除しました');
  }
});

document.getElementById('save-problem-btn').onclick = saveProblemToStorage;

// 初期表示
renderSavedProblems();

// スクリプトはbody末尾にあるのでDOMは確実に構築済み
init();
</script>
