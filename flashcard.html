<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>フラッシュカード — 二級建築士製図</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:     #ebe7dc;
      --surface:#faf7f0;
      --ink:    #1a1a1a;
      --inkSoft:#555555;
      --rule:   #d4cfc0;
      --red:    #d3312a;
      --blue:   #2952c8;
      --yellow: #f5c518;
      --green:  #2e7d32;
    }
    body{background:var(--bg);color:var(--ink);
      font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
      min-height:100dvh;overflow-x:hidden;}

    /* ── TOPBAR ── */
    #topbar{
      position:fixed;top:0;left:0;right:0;height:48px;
      background:var(--ink);
      display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;
    }
    .back-btn{
      color:#f0ede6;font-size:18px;cursor:pointer;
      background:none;border:none;padding:4px;line-height:1;
    }
    .topbar-title{
      font-family:'Archivo','Noto Sans JP',sans-serif;
      font-size:13px;font-weight:900;color:#f0ede6;letter-spacing:.08em;
      text-transform:uppercase;
    }
    .topbar-cat{
      margin-left:auto;font-size:11px;color:#888;font-weight:700;
    }

    /* ── MAIN LAYOUT ── */
    #main{
      padding-top:48px;
      min-height:100dvh;
      display:flex;flex-direction:column;
    }

    /* ── CATEGORY TABS ── */
    #cat-bar{
      background:var(--surface);
      border-bottom:2px solid var(--ink);
      overflow-x:auto;
      display:flex;
      padding:0 12px;
      gap:0;
      scrollbar-width:none;
    }
    #cat-bar::-webkit-scrollbar{display:none;}
    .cat-tab{
      flex-shrink:0;
      padding:10px 14px;
      font-size:11px;font-weight:700;
      color:var(--inkSoft);
      cursor:pointer;
      border-bottom:3px solid transparent;
      white-space:nowrap;
      transition:all .15s;
      background:none;border-top:none;border-left:none;border-right:none;
    }
    .cat-tab.active{
      color:var(--ink);
      border-bottom-color:var(--ink);
    }

    /* ── PROGRESS ── */
    #progress-wrap{
      padding:12px 16px 0;
      display:flex;align-items:center;gap:10px;
    }
    #progress-bar-bg{
      flex:1;height:4px;background:var(--rule);border-radius:2px;overflow:hidden;
    }
    #progress-bar{height:100%;background:var(--ink);border-radius:2px;transition:width .3s;}
    #progress-label{font-size:11px;color:var(--inkSoft);white-space:nowrap;font-weight:700;}

    /* ── CARD AREA ── */
    #card-area{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:16px 16px 0;
    }

    /* 3D flip */
    .card-scene{
      width:100%;max-width:480px;
      perspective:1000px;
      margin-bottom:16px;
    }
    .card-inner{
      position:relative;
      width:100%;
      transition:transform .45s cubic-bezier(.4,0,.2,1);
      transform-style:preserve-3d;
    }
    .card-inner.flipped{transform:rotateY(180deg);}
    .card-face{
      width:100%;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      background:var(--surface);
      border:2px solid var(--ink);
      padding:20px 18px;
      min-height:280px;
      display:flex;
      flex-direction:column;
    }
    .card-face.back{
      position:absolute;top:0;left:0;
      transform:rotateY(180deg);
      background:#fff;
    }
    .card-label{
      font-size:9px;font-weight:900;letter-spacing:.15em;
      text-transform:uppercase;color:var(--inkSoft);
      margin-bottom:10px;
      font-family:'Archivo',sans-serif;
    }
    .card-face.back .card-label{color:var(--blue);}
    .card-question{
      font-size:16px;font-weight:700;line-height:1.6;color:var(--ink);
      margin-bottom:10px;
    }
    .card-image{
      width:100%;max-height:180px;object-fit:contain;
      margin:8px 0;
      background:var(--bg);
      border:1px solid var(--rule);
    }
    .card-image.hidden{display:none;}

    /* 4択 */
    .choices-list{
      display:flex;flex-direction:column;gap:8px;
      margin-top:6px;
    }
    .choice-btn{
      width:100%;padding:11px 12px;
      font-size:13px;font-weight:700;
      text-align:left;
      background:var(--bg);
      border:2px solid var(--ink);
      color:var(--ink);
      cursor:pointer;
      font-family:'Noto Sans JP',sans-serif;
      transition:background .12s, color .12s, border-color .12s;
      display:flex;align-items:flex-start;gap:10px;
      line-height:1.5;
    }
    .choice-btn:active{transform:scale(.99);}
    .choice-btn.correct{
      background:var(--blue);color:#fff;border-color:var(--blue);
    }
    .choice-btn.wrong{
      background:var(--red);color:#fff;border-color:var(--red);
    }
    .choice-btn.fade{opacity:.5;}
    .choice-btn.locked{pointer-events:none;}
    .choice-num{
      display:inline-flex;align-items:center;justify-content:center;
      width:22px;height:22px;
      font-family:'Archivo',sans-serif;
      font-size:11px;font-weight:900;
      background:var(--ink);color:#f0ede6;
      flex-shrink:0;
      margin-top:1px;
    }
    .choice-btn.correct .choice-num{background:#fff;color:var(--blue);}
    .choice-btn.wrong .choice-num{background:#fff;color:var(--red);}

    /* 裏面 */
    .result-banner{
      font-family:'Archivo',sans-serif;
      font-size:10px;font-weight:900;letter-spacing:.12em;
      margin-bottom:10px;
      padding:5px 9px;
      display:inline-block;
    }
    .result-banner.correct{background:var(--blue);color:#fff;}
    .result-banner.wrong{background:var(--red);color:#fff;}
    .answer-text{
      font-size:15px;font-weight:900;color:var(--ink);
      margin-bottom:8px;line-height:1.5;
    }
    .answer-text strong{color:var(--red);}
    .explanation-text{
      font-size:13px;line-height:1.7;color:var(--ink);
      margin-bottom:8px;white-space:pre-wrap;
    }
    .explanation-text strong{font-weight:900;color:var(--red);}
    .lawref-text{
      font-size:11px;color:var(--inkSoft);
      font-family:'Archivo','Noto Sans JP',sans-serif;
      letter-spacing:.03em;
      margin-bottom:10px;
    }
    .lawref-text.hidden{display:none;}
    .back-bottom{
      margin-top:auto;display:flex;flex-direction:column;gap:8px;
    }
    .weak-toggle-btn{
      font-size:11px;font-weight:700;
      padding:7px 12px;
      border:1px solid var(--rule);
      background:transparent;color:var(--inkSoft);
      cursor:pointer;
      letter-spacing:.04em;
      align-self:flex-start;
      transition:all .12s;
    }
    .weak-toggle-btn.is-weak{
      background:var(--red);color:#fff;border-color:var(--red);
    }
    .next-btn{
      width:100%;padding:13px;
      background:var(--ink);color:#f0ede6;
      border:2px solid var(--ink);
      font-weight:900;font-size:13px;
      cursor:pointer;
      letter-spacing:.04em;
    }
    .next-btn:active{transform:scale(.98);}

    /* difficulty stars */
    .card-meta{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:8px;
    }
    .card-diff{
      display:flex;gap:3px;align-items:center;
    }
    .diff-star{font-size:10px;color:var(--rule);}
    .diff-star.on{color:var(--yellow);}
    .card-subcat{
      font-size:10px;font-weight:700;color:var(--inkSoft);
      letter-spacing:.04em;
    }
    .card-subcat.hidden{display:none;}

    /* legacy fallback (for旧スキーマカード) */
    .card-answer{
      font-size:14px;line-height:1.8;color:var(--ink);
      flex:1;white-space:pre-wrap;
    }
    .card-answer strong{color:var(--red);font-weight:900;}
    .legacy-tap-hint{
      font-size:10px;color:var(--inkSoft);text-align:right;margin-top:auto;
    }
    .legacy-tap-hint.hidden{display:none;}

    /* skip button */
    #skip-btn-wrap{
      width:100%;max-width:480px;display:flex;justify-content:center;
      padding:0 0 24px;
    }
    .skip-btn{
      padding:8px 16px;
      font-size:11px;font-weight:700;
      border:1px solid var(--rule);
      background:transparent;color:var(--inkSoft);
      cursor:pointer;letter-spacing:.04em;
    }

    /* ── RESULT SCREEN ── */
    #result-screen{
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:32px 16px;
      min-height:calc(100dvh - 48px - 44px);
    }
    #result-screen.show{display:flex;}
    .result-title{
      font-family:'Archivo','Noto Sans JP',sans-serif;
      font-size:28px;font-weight:900;
      letter-spacing:-.01em;color:var(--ink);
      margin-bottom:8px;
    }
    .result-sub{font-size:13px;color:var(--inkSoft);margin-bottom:24px;}
    .result-score-wrap{
      display:flex;gap:24px;margin-bottom:32px;
    }
    .result-score-box{
      text-align:center;
      background:var(--surface);
      border:2px solid var(--ink);
      padding:16px 24px;
      min-width:90px;
    }
    .result-score-num{
      font-family:'Archivo',sans-serif;
      font-size:36px;font-weight:900;line-height:1;
    }
    .result-score-num.ok{color:var(--blue);}
    .result-score-num.ng{color:var(--red);}
    .result-score-label{font-size:10px;color:var(--inkSoft);margin-top:4px;font-weight:700;}
    .result-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;}
    .result-btn{
      padding:14px;font-size:13px;font-weight:900;
      border:2px solid var(--ink);cursor:pointer;
      font-family:'Noto Sans JP',sans-serif;
    }
    #retry-ng-btn{background:var(--red);color:#fff;border-color:var(--red);}
    #retry-all-btn{background:var(--ink);color:#f0ede6;}
    #back-cat-btn{background:var(--bg);color:var(--ink);}

    /* ── EMPTY STATE ── */
    #empty-state{
      display:none;
      flex-direction:column;align-items:center;justify-content:center;
      padding:60px 24px;text-align:center;
      min-height:calc(100dvh - 200px);
    }
    #empty-state.show{display:flex;}
    .empty-icon{font-size:48px;margin-bottom:16px;}
    .empty-title{font-size:18px;font-weight:900;margin-bottom:8px;}
    .empty-sub{font-size:13px;color:var(--inkSoft);}

    /* ── SWIPE ANIMATION ── */
    .card-scene.swipe-right .card-inner{
      animation:swipeRight .35s forwards;
    }
    .card-scene.swipe-left .card-inner{
      animation:swipeLeft .35s forwards;
    }
    @keyframes swipeRight{
      to{transform:translateX(120%) rotate(15deg);opacity:0;}
    }
    @keyframes swipeLeft{
      to{transform:translateX(-120%) rotate(-15deg);opacity:0;}
    }

    /* ── WEAK BADGE ── */
    .weak-badge{
      position:absolute;top:8px;right:8px;
      font-size:9px;font-weight:700;
      background:var(--red);color:#fff;
      padding:2px 6px;
      letter-spacing:.05em;
    }
  </style>
</head>
<body>

<div id="topbar">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
  <span class="topbar-title">Flash Cards</span>
  <span class="topbar-cat" id="topbar-cat"></span>
</div>

<div id="main">

  <!-- カテゴリタブ -->
  <div id="cat-bar">
    <button class="cat-tab active" data-cat="all">すべて</button>
    <button class="cat-tab" data-cat="法規">法規</button>
    <button class="cat-tab" data-cat="構造">構造</button>
    <button class="cat-tab" data-cat="計算">計算</button>
    <button class="cat-tab" data-cat="エスキス">エスキス</button>
    <button class="cat-tab" data-cat="用語">用語</button>
    <button class="cat-tab" data-cat="weak">苦手のみ 🔴</button>
  </div>

  <!-- プログレス -->
  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar" style="width:0%"></div></div>
    <span id="progress-label">0 / 0</span>
  </div>

  <!-- カードエリア -->
  <div id="card-area">
    <div class="card-scene" id="card-scene">
      <div class="card-inner" id="card-inner">

        <!-- 表面 -->
        <div class="card-face front" id="card-front">
          <div class="card-meta">
            <span class="card-subcat hidden" id="card-subcat"></span>
            <div class="card-diff" id="card-diff"></div>
          </div>
          <div class="card-label">QUESTION</div>
          <div class="card-question" id="card-q"></div>
          <img class="card-image hidden" id="card-q-image" alt="">

          <!-- 新スキーマ：4択 -->
          <div class="choices-list" id="choices-list"></div>

          <!-- 旧スキーマ：タップヒント -->
          <div class="legacy-tap-hint hidden" id="legacy-tap-hint">タップで答えを見る →</div>
        </div>

        <!-- 裏面 -->
        <div class="card-face back" id="card-back">
          <!-- 新スキーマ表示 -->
          <div id="back-new" style="display:none;flex-direction:column;flex:1;">
            <span class="result-banner" id="result-banner"></span>
            <div class="card-label">ANSWER</div>
            <div class="answer-text" id="answer-text"></div>
            <div class="explanation-text" id="explanation-text"></div>
            <div class="lawref-text hidden" id="lawref-text"></div>
            <img class="card-image hidden" id="card-a-image" alt="">
            <div class="back-bottom">
              <button class="weak-toggle-btn" id="weak-toggle"></button>
              <button class="next-btn" id="next-btn">次へ →</button>
            </div>
          </div>

          <!-- 旧スキーマ fallback -->
          <div id="back-legacy" style="display:none;flex-direction:column;flex:1;">
            <div class="card-label">ANSWER</div>
            <div class="card-answer" id="card-a"></div>
            <div class="legacy-tap-hint" style="text-align:left;margin-top:auto;">← タップで問題に戻る</div>
          </div>
        </div>

      </div>
    </div>

    <div id="skip-btn-wrap">
      <button class="skip-btn" id="skip-btn">スキップ</button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen">
    <div class="result-title" id="result-title">セッション完了</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-score-wrap">
      <div class="result-score-box">
        <div class="result-score-num ok" id="res-ok">0</div>
        <div class="result-score-label">正解</div>
      </div>
      <div class="result-score-box">
        <div class="result-score-num ng" id="res-ng">0</div>
        <div class="result-score-label">不正解</div>
      </div>
    </div>
    <div class="result-btns">
      <button class="result-btn" id="retry-ng-btn">🔁 苦手カードを再挑戦</button>
      <button class="result-btn" id="retry-all-btn">↺ もう一度最初から</button>
      <button class="result-btn" id="back-cat-btn">← カテゴリに戻る</button>
    </div>
  </div>

  <!-- 空状態 -->
  <div id="empty-state">
    <div class="empty-icon">🎉</div>
    <div class="empty-title">苦手カードなし！</div>
    <div class="empty-sub">すべてのカードを正解しました。<br>他のカテゴリも練習してみましょう。</div>
    <button class="result-btn" style="margin-top:20px;background:var(--ink);color:#f0ede6;border:2px solid var(--ink);padding:12px 24px;font-weight:900;font-size:13px;cursor:pointer;" id="empty-back-btn">← カテゴリに戻る</button>
  </div>

</div>

<script>
// ── 状態 ──────────────────────────────────────
let allCards = [];
let deck = [];
let deckIdx = 0;
let sessionOK = 0;
let sessionNG = 0;
let ngCards = [];
let isFlipped = false;
let currentCat = 'all';
let currentCard = null;
let answered = false;     // 表面で選択済みフラグ
let lastCorrect = false;  // 直前の選択が正解だったか

const WEAK_KEY = 'fc_weak';

// ── localStorage ──────────────────────────────────
function getWeakIds() {
  try { return JSON.parse(localStorage.getItem(WEAK_KEY)) || []; }
  catch { return []; }
}
function setWeakIds(ids) {
  localStorage.setItem(WEAK_KEY, JSON.stringify(ids));
}
function isWeak(id) { return getWeakIds().includes(id); }
function markWeak(id) {
  const ids = getWeakIds();
  if(!ids.includes(id)) ids.push(id);
  setWeakIds(ids);
}
function unmarkWeak(id) {
  setWeakIds(getWeakIds().filter(x => x !== id));
}

// ── テキスト整形 ─────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function renderInline(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

// ── スキーマ判定 ─────────────────────────────────
function isNewSchema(card) {
  return card && Array.isArray(card.choices) && card.choices.length === 4
    && Number.isInteger(card.correctIndex);
}

// ── カテゴリタブ ─────────────────────────────────
document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    startSession(currentCat);
  });
});

// ── セッション開始 ────────────────────────────────
function startSession(cat) {
  const weakIds = getWeakIds();
  if(cat === 'weak') {
    deck = allCards.filter(c => weakIds.includes(c.id));
  } else if(cat === 'all') {
    deck = [...allCards];
  } else {
    deck = allCards.filter(c => c.category === cat);
  }

  // シャッフル
  for(let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }

  deckIdx = 0;
  sessionOK = 0;
  sessionNG = 0;
  ngCards = [];

  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('empty-state').classList.remove('show');
  document.getElementById('card-area').style.display = '';
  document.getElementById('progress-wrap').style.display = '';

  const catName = cat === 'all' ? 'すべて' : cat === 'weak' ? '苦手カード' : cat;
  document.getElementById('topbar-cat').textContent = `${catName}  ${deck.length}枚`;

  if(deck.length === 0) {
    document.getElementById('card-area').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('empty-state').classList.add('show');
    return;
  }
  showCard();
}

// ── カード表示 ────────────────────────────────────
function showCard() {
  if(deckIdx >= deck.length) {
    showResult();
    return;
  }
  currentCard = deck[deckIdx];
  isFlipped = false;
  answered = false;
  lastCorrect = false;

  // 共通：難易度・サブカテゴリ・苦手バッジ
  const diff = currentCard.difficulty || 1;
  document.getElementById('card-diff').innerHTML =
    [1,2,3].map(i => `<span class="diff-star ${i<=diff?'on':''}">★</span>`).join('');

  const subEl = document.getElementById('card-subcat');
  if(currentCard.subcategory) {
    subEl.textContent = currentCard.subcategory;
    subEl.classList.remove('hidden');
  } else {
    subEl.classList.add('hidden');
  }

  // 苦手バッジ
  const existingBadge = document.querySelector('.weak-badge');
  if(existingBadge) existingBadge.remove();
  if(isWeak(currentCard.id)) {
    const badge = document.createElement('div');
    badge.className = 'weak-badge';
    badge.textContent = '苦手';
    document.getElementById('card-front').style.position = 'relative';
    document.getElementById('card-front').appendChild(badge);
  }

  // スキーマ別レンダリング
  if(isNewSchema(currentCard)) {
    renderNewFront(currentCard);
  } else {
    renderLegacyFront(currentCard);
  }

  // 表面に戻す
  document.getElementById('card-inner').classList.remove('flipped');

  // スワイプアニメリセット
  const scene = document.getElementById('card-scene');
  scene.classList.remove('swipe-right', 'swipe-left');
  void scene.offsetWidth;

  updateProgress();
}

// ── 新スキーマ：表面 ────────────────────────────
function renderNewFront(card) {
  document.getElementById('card-q').textContent = card.question;

  // 問題画像
  const qImg = document.getElementById('card-q-image');
  if(card.questionImage) {
    qImg.src = card.questionImage;
    qImg.alt = card.question;
    qImg.classList.remove('hidden');
  } else {
    qImg.classList.add('hidden');
  }

  // 4択
  const list = document.getElementById('choices-list');
  list.innerHTML = '';
  card.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.idx = String(i);
    const num = document.createElement('span');
    num.className = 'choice-num';
    num.textContent = String(i + 1);
    const txt = document.createElement('span');
    txt.textContent = choice;
    btn.appendChild(num);
    btn.appendChild(txt);
    btn.addEventListener('click', () => onChoice(i));
    list.appendChild(btn);
  });
  list.style.display = '';

  // 旧UIのヒント非表示
  document.getElementById('legacy-tap-hint').classList.add('hidden');
}

// ── 旧スキーマ：表面（後方互換） ──────────────────
function renderLegacyFront(card) {
  document.getElementById('card-q').textContent = card.front;
  document.getElementById('card-q-image').classList.add('hidden');
  document.getElementById('choices-list').innerHTML = '';
  document.getElementById('choices-list').style.display = 'none';
  document.getElementById('legacy-tap-hint').classList.remove('hidden');
  // 裏面も事前にレンダリング（旧スキーマはタップでフリップするため）
  renderLegacyBack(card);
}

// ── 選択肢クリック ───────────────────────────────
function onChoice(idx) {
  if(answered || !isNewSchema(currentCard)) return;
  answered = true;
  lastCorrect = (idx === currentCard.correctIndex);

  const btns = document.querySelectorAll('#choices-list .choice-btn');
  btns.forEach((b, i) => {
    b.classList.add('locked');
    if(i === currentCard.correctIndex) b.classList.add('correct');
    else if(i === idx) b.classList.add('wrong');
    else b.classList.add('fade');
  });

  // 自動苦手判定
  if(lastCorrect) {
    sessionOK++;
    unmarkWeak(currentCard.id);
  } else {
    sessionNG++;
    markWeak(currentCard.id);
    ngCards.push(currentCard);
  }

  // 0.6秒後にフリップ
  setTimeout(() => flipToBack(), 600);
}

// ── 裏面表示 ──────────────────────────────────
function flipToBack() {
  if(isNewSchema(currentCard)) {
    renderNewBack(currentCard);
  } else {
    renderLegacyBack(currentCard);
  }
  isFlipped = true;
  document.getElementById('card-inner').classList.add('flipped');
}

function renderNewBack(card) {
  document.getElementById('back-new').style.display = 'flex';
  document.getElementById('back-legacy').style.display = 'none';

  const banner = document.getElementById('result-banner');
  banner.textContent = lastCorrect ? '✓ CORRECT' : '✕ INCORRECT';
  banner.className = 'result-banner ' + (lastCorrect ? 'correct' : 'wrong');

  document.getElementById('answer-text').textContent = card.choices[card.correctIndex];
  document.getElementById('explanation-text').innerHTML = renderInline(card.explanation || '');

  const lawEl = document.getElementById('lawref-text');
  if(card.lawRef) {
    lawEl.textContent = card.lawRef;
    lawEl.classList.remove('hidden');
  } else {
    lawEl.classList.add('hidden');
  }

  // 解説画像
  const aImg = document.getElementById('card-a-image');
  if(card.explanationImage) {
    aImg.src = card.explanationImage;
    aImg.alt = '';
    aImg.classList.remove('hidden');
  } else {
    aImg.classList.add('hidden');
  }

  updateWeakToggle();
}

function renderLegacyBack(card) {
  document.getElementById('back-new').style.display = 'none';
  document.getElementById('back-legacy').style.display = 'flex';
  document.getElementById('card-a').innerHTML = renderInline(card.back || '');
}

// ── 苦手トグル ───────────────────────────────
function updateWeakToggle() {
  const btn = document.getElementById('weak-toggle');
  const weak = isWeak(currentCard.id);
  btn.textContent = weak ? '✓ 苦手から外す' : '✕ 苦手に登録';
  btn.classList.toggle('is-weak', weak);
}

document.getElementById('weak-toggle').addEventListener('click', () => {
  if(!currentCard) return;
  if(isWeak(currentCard.id)) unmarkWeak(currentCard.id);
  else markWeak(currentCard.id);
  updateWeakToggle();
});

// ── 次へ ─────────────────────────────────────
document.getElementById('next-btn').addEventListener('click', () => {
  if(!isFlipped) return;
  animateSwipe('right', () => {
    deckIdx++;
    showCard();
  });
});

// ── スキップ ─────────────────────────────────
document.getElementById('skip-btn').addEventListener('click', () => {
  animateSwipe('right', () => {
    deckIdx++;
    showCard();
  });
});

// ── 旧スキーマ fallback：カードタップでフリップ ──
document.getElementById('card-scene').addEventListener('click', e => {
  if(isNewSchema(currentCard)) return;
  // 「次へ」ボタンクリックの伝播は防ぐ
  if(e.target.closest('.next-btn, .weak-toggle-btn, .choice-btn')) return;
  if(deckIdx >= deck.length) return;
  isFlipped = !isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
});

// ── 進捗 ─────────────────────────────────────
function updateProgress() {
  const total = deck.length;
  const done  = deckIdx;
  const pct   = total > 0 ? (done / total * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total}`;
}

// ── スワイプアニメ ────────────────────────────
function animateSwipe(dir, callback) {
  const scene = document.getElementById('card-scene');
  scene.classList.add(dir === 'right' ? 'swipe-right' : 'swipe-left');
  setTimeout(callback, 350);
}

// ── スワイプジェスチャー（裏面のみ） ──────────────
let touchStartX = 0, touchStartY = 0;
document.getElementById('card-scene').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});

document.getElementById('card-scene').addEventListener('touchend', e => {
  if(!isFlipped) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
  // 右でも左でも次へ進む（苦手判定はトグルで手動）
  animateSwipe(dx > 0 ? 'right' : 'left', () => {
    deckIdx++;
    showCard();
  });
}, {passive:true});

// ── キーボード操作 ────────────────────────────
document.addEventListener('keydown', e => {
  if(deckIdx >= deck.length) return;

  // 表面で 1〜4：選択肢
  if(!isFlipped && isNewSchema(currentCard) && !answered) {
    if(['1','2','3','4'].includes(e.key)) {
      e.preventDefault();
      onChoice(parseInt(e.key, 10) - 1);
      return;
    }
  }
  // 裏面で Space/Enter：次へ
  if(isFlipped && (e.key === ' ' || e.key === 'Enter')) {
    e.preventDefault();
    document.getElementById('next-btn').click();
    return;
  }
  // 旧スキーマ：Space/Enter で flip
  if(!isFlipped && !isNewSchema(currentCard) && (e.key === ' ' || e.key === 'Enter')) {
    e.preventDefault();
    isFlipped = true;
    document.getElementById('card-inner').classList.add('flipped');
    return;
  }
  // ↓：スキップ
  if(e.key === 'ArrowDown') {
    e.preventDefault();
    document.getElementById('skip-btn').click();
  }
});

// ── 結果画面 ──────────────────────────────────
function showResult() {
  document.getElementById('card-area').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';

  const total = sessionOK + sessionNG;
  const pct = total > 0 ? Math.round(sessionOK / total * 100) : 0;
  const catName = currentCat === 'all' ? '全カード' : currentCat === 'weak' ? '苦手カード' : currentCat;

  document.getElementById('result-title').textContent =
    pct >= 80 ? '素晴らしい！' : pct >= 60 ? 'もう少し！' : '復習しよう';
  document.getElementById('result-sub').textContent =
    `${catName}  正解率 ${pct}%（${sessionOK}/${total}）`;
  document.getElementById('res-ok').textContent = sessionOK;
  document.getElementById('res-ng').textContent = sessionNG;

  document.getElementById('retry-ng-btn').style.display = ngCards.length > 0 ? '' : 'none';

  document.getElementById('result-screen').classList.add('show');
}

document.getElementById('retry-ng-btn').addEventListener('click', () => {
  deck = [...ngCards];
  for(let i = deck.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  deckIdx=0; sessionOK=0; sessionNG=0; ngCards=[];
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('card-area').style.display = '';
  document.getElementById('progress-wrap').style.display = '';
  showCard();
});

document.getElementById('retry-all-btn').addEventListener('click', () => {
  startSession(currentCat);
});
document.getElementById('back-cat-btn').addEventListener('click', () => {
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('empty-state').classList.remove('show');
  document.getElementById('card-area').style.display = '';
  document.getElementById('progress-wrap').style.display = '';
  startSession(currentCat);
});
document.getElementById('empty-back-btn').addEventListener('click', () => {
  document.getElementById('empty-state').classList.remove('show');
  document.getElementById('card-area').style.display = '';
  document.getElementById('progress-wrap').style.display = '';
  startSession(currentCat);
});

// ── 初期化 ──────────────────────────────────
fetch('cards.json?_t=' + Date.now(), {cache: 'no-store'})
  .then(r => r.json())
  .then(data => {
    allCards = data;
    startSession('all');
  })
  .catch(() => {
    document.getElementById('card-q').textContent = 'カードデータを読み込めませんでした。';
  });
</script>
</body>
</html>
