<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <title>エスキスアプリ</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      /* Bauhaus-inspired dark theme for drawing tool */
      --bg:     #1a1a1a;      /* Bauhaus ink */
      --panel:  #242424;      /* slightly lighter */
      --border: #3a3a3a;
      --accent: #2952c8;      /* Bauhaus blue */
      --danger: #d3312a;      /* Bauhaus red */
      --yellow: #f5c518;      /* Bauhaus yellow */
      --text:   #f0ede6;      /* warm off-white (Bauhaus paper) */
      --sub:    #888;
      --paper:  #f5f0e8;      /* canvas background stays warm */
    }
    body{background:var(--bg);color:var(--text);
      font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
      overflow:hidden;height:100dvh;width:100vw;user-select:none;}

    /* === CANVAS === */
    #canvas-wrap{
      position:fixed;top:44px;left:0;right:0;
      bottom:calc(60px + env(safe-area-inset-bottom, 0px));
      background:var(--paper);overflow:hidden;
    }
    #canvas{position:absolute;top:0;left:0;touch-action:none;cursor:crosshair;}

    /* === TOP BAR === */
    #topbar{
      position:fixed;top:0;left:0;right:0;height:44px;
      background:var(--bg);border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 8px;gap:8px;z-index:100;
    }
    #topbar .app-title{font-size:13px;font-weight:900;color:var(--text);font-family:'Archivo','Noto Sans JP',sans-serif;letter-spacing:.05em;}
    #zoom-info{font-size:11px;color:var(--sub);margin-left:auto;}
    .icon-btn{
      width:32px;height:32px;border-radius:8px;border:none;
      background:var(--panel);color:var(--text);cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:16px;
    }

    /* === BOTTOM TOOLBAR === */
    #toolbar{
      position:fixed;bottom:0;left:0;right:0;
      height:calc(60px + env(safe-area-inset-bottom, 0px));
      padding-bottom:env(safe-area-inset-bottom, 0px);
      background:var(--bg);border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-around;z-index:400;
    }
    .tbtn{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      padding:6px 10px;border-radius:8px;cursor:pointer;border:none;
      background:transparent;color:var(--sub);font-size:9px;min-width:52px;
    }
    .tbtn.active{background:rgba(41,82,200,.25);color:var(--accent);}
    .tbtn svg{width:22px;height:22px;}

    /* === FLOATING BUTTONS === */
    #undo-btn,#redo-btn{
      position:fixed;right:8px;z-index:100;
      width:34px;height:34px;border-radius:50%;
      background:rgba(26,26,46,.9);border:1px solid var(--border);
      color:var(--text);font-size:16px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
    #undo-btn{top:52px;}#redo-btn{top:92px;}
    #area-overlay{
      position:fixed;top:52px;left:8px;z-index:100;
      background:rgba(26,26,46,.85);border-radius:8px;
      padding:6px 10px;font-size:10px;color:var(--sub);
      max-width:140px;border:1px solid var(--border);
    }
    #area-overlay .total{font-size:12px;font-weight:bold;color:var(--accent);}

    /* === PANELS (slide up/right) === */
    .panel{
      position:fixed;background:var(--bg);z-index:200;
      border:1px solid var(--border);
    }
    #room-panel{
      bottom:calc(60px + env(safe-area-inset-bottom, 0px));left:0;right:0;max-height:55vh;overflow-y:auto;
      border-radius:14px 14px 0 0;border-bottom:none;
      padding:12px;transform:translateY(calc(100% + 80px));transition:transform .3s;
      pointer-events:none;
    }
    #room-panel.open{transform:translateY(0);pointer-events:auto;}
    #cond-panel:not(.open){pointer-events:none;}
    #cond-panel{
      top:44px;right:0;width:min(300px,100vw);
      height:calc(100dvh - 104px - env(safe-area-inset-bottom, 0px));border-radius:0 0 0 12px;
      padding:12px;overflow-y:auto;
      transform:translateX(100%);transition:transform .3s;
    }
    #cond-panel.open{transform:translateX(0);}
    .panel-handle{
      width:36px;height:4px;background:var(--border);
      border-radius:2px;margin:0 auto 10px;
    }
    .panel-title{font-size:12px;color:var(--sub);text-align:center;margin-bottom:10px;font-weight:bold;}

    /* === ROOM PANEL === */
    .room-grid{display:flex;flex-direction:column;gap:10px;}
    .rtype-cat-label{
      font-size:10px;font-weight:bold;color:var(--sub);letter-spacing:.08em;
      text-transform:uppercase;padding:2px 0 0;border-top:1px solid var(--border);
      margin-top:2px;
    }
    .rtype-cat-label:first-child{border-top:none;margin-top:0;}
    .rtype-cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
    .rtype-btn{
      padding:8px 4px;border-radius:8px;border:1px solid var(--border);
      background:var(--panel);color:var(--text);font-size:11px;
      cursor:pointer;text-align:center;transition:all .15s;
    }
    .rtype-btn.sel{border-color:var(--accent);background:rgba(41,82,200,.2);}
    .rtype-dot{width:12px;height:12px;border-radius:3px;margin:0 auto 3px;}
    #other-name-row{
      display:none;padding:8px 2px 0;
    }
    #other-name-input{
      width:100%;padding:8px 10px;border-radius:8px;
      border:1px solid var(--accent);background:var(--bg);
      color:var(--text);font-size:13px;
    }

    /* === CONDITIONS PANEL === */
    .cform{display:flex;flex-direction:column;gap:10px;}
    .fgroup{display:flex;flex-direction:column;gap:3px;}
    .fgroup label{font-size:10px;color:var(--sub);}
    .fgroup input,.fgroup select,.fgroup textarea{
      background:var(--panel);border:1px solid var(--border);
      border-radius:6px;color:var(--text);padding:7px 8px;
      font-size:12px;width:100%;
    }
    .fgroup-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

    /* Lock */
    #cond-lock-banner{
      display:none;background:rgba(255,160,0,.12);border:1px solid rgba(255,160,0,.35);
      border-radius:8px;padding:7px 10px;font-size:11px;color:#FFB74D;
      text-align:center;margin-bottom:2px;
    }
    #cond-panel.locked #cond-lock-banner{display:block;}
    #cond-panel.locked .cform input,
    #cond-panel.locked .cform select,
    #cond-panel.locked .cform textarea{opacity:.65;pointer-events:none;}
    #cond-panel.locked .adj-type,
    #cond-panel.locked .adj-width,
    #cond-panel.locked .adj-opp-type,
    #cond-panel.locked .adj-opp-width{opacity:.65;pointer-events:none;}
    #cond-panel.locked #add-req-btn,
    #cond-panel.locked #add-ext-btn,
    #cond-panel.locked .req-del,
    #cond-panel.locked .ext-del,
    #cond-panel.locked #apply-site-btn{display:none;}

    /* Mini site diagram */
    #site-diagram-wrap{
      background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:8px;overflow:hidden;
    }
    #site-diagram{display:flex;justify-content:center;padding:8px 8px 0;}
    #site-diagram svg{width:min(160px,60vw);height:auto;}
    .adj-table{padding:6px 8px 8px;display:flex;flex-direction:column;gap:4px;}
    .adj-row{display:grid;grid-template-columns:36px 1fr 72px;gap:4px;align-items:center;}
    .adj-dir{font-size:10px;color:var(--sub);font-weight:bold;}
    .adj-row select,.adj-row input{padding:4px 6px;font-size:11px;}
    .adj-opposite-row{display:none;grid-template-columns:36px 1fr 72px;gap:4px;align-items:center;}
    .adj-opposite-row select,.adj-opposite-row input{padding:3px 5px;font-size:10px;background:var(--panel);}
    .adj-opposite-row .adj-opp-label{font-size:9px;color:var(--sub);padding-left:2px;}

    /* Requirements */
    .req-list{display:flex;flex-direction:column;gap:8px;}
    .req-item{
      background:rgba(255,255,255,.03);border:1px solid var(--border);
      border-radius:8px;padding:8px;display:flex;flex-direction:column;gap:5px;
    }
    .req-card-header{display:grid;grid-template-columns:1fr auto auto;gap:4px;align-items:center;}
    .req-name-input{font-size:12px;font-weight:600;padding:4px 6px;width:100%;}
    .req-card-area{display:grid;grid-template-columns:40px 1fr;gap:4px;align-items:center;}
    .req-notes-section{display:flex;flex-direction:column;gap:3px;}
    .req-field-label{font-size:9px;color:var(--sub);letter-spacing:.05em;padding-top:1px;}
    .req-note-row{display:grid;grid-template-columns:auto 1fr auto;gap:3px;align-items:center;}
    .req-note-bullet{font-size:11px;color:var(--sub);}
    .req-note-input{font-size:11px;padding:3px 5px;}
    .req-note-del{background:none;border:none;color:var(--sub);cursor:pointer;font-size:11px;padding:0 2px;line-height:1;}
    .req-add-note{font-size:10px;color:var(--accent);background:none;border:none;cursor:pointer;text-align:left;padding:2px 0 0 14px;opacity:.8;}
    .req-add-note:hover{opacity:1;}
    .req-item input,.req-item select{padding:4px 5px;font-size:11px;}
    .add-req-btn,.add-ext-btn{
      padding:7px;background:var(--panel);border:1px dashed var(--border);
      border-radius:6px;color:var(--sub);cursor:pointer;font-size:12px;
      text-align:center;width:100%;margin-top:4px;
    }
    .req-del,.ext-del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:0 2px;}
    /* Checklist notes */
    .cl-item{flex-direction:column;align-items:flex-start;}
    .cl-item-main{display:flex;align-items:baseline;gap:5px;width:100%;}
    .cl-notes{padding-left:18px;margin-top:2px;}
    .cl-note{font-size:9px;color:var(--sub);line-height:1.6;}

    /* Exterior conditions */
    .ext-list{display:flex;flex-direction:column;gap:6px;}
    .ext-item{
      display:grid;grid-template-columns:90px 1fr auto;gap:4px;align-items:center;
    }
    .ext-item select,.ext-item input{padding:4px 5px;font-size:11px;}

    /* === MODAL === */
    #modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.6);
      z-index:400;display:none;align-items:center;justify-content:center;
    }
    #modal-overlay.open{display:flex;}
    .modal{
      background:var(--bg);border:1px solid var(--border);
      border-radius:12px;padding:20px;width:min(280px,90vw);
    }
    .modal h3{font-size:14px;text-align:center;margin-bottom:14px;}
    .modal-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
    .modal-row.full{grid-template-columns:1fr;}
    .modal label{font-size:10px;color:var(--sub);display:block;margin-bottom:2px;}
    .modal input,.modal select{
      width:100%;background:var(--panel);border:1px solid var(--border);
      border-radius:6px;color:var(--text);padding:7px 8px;font-size:12px;
    }
    .modal-actions{display:flex;gap:8px;margin-top:14px;}
    .btn{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:bold;}
    .btn-p{background:var(--accent);color:#fff;}
    .btn-d{background:var(--danger);color:#fff;}
    .btn-s{background:var(--panel);color:var(--text);border:1px solid var(--border);}

    /* === SNACKBAR === */
    #snack{
      position:fixed;bottom:68px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.85);color:#fff;padding:7px 16px;
      border-radius:20px;font-size:12px;z-index:500;
      opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
    }
    #snack.show{opacity:1;}

    /* === DIMENSION TOOLTIP === */
    #dimtip{
      position:fixed;background:rgba(0,0,0,.75);color:#fff;
      padding:3px 7px;border-radius:4px;font-size:10px;
      pointer-events:none;z-index:300;display:none;
    }

    /* === OVERLAY BLOCKER === */
    #overlay-blocker{
      position:fixed;inset:0;z-index:150;display:none;
    }
    #overlay-blocker.show{display:block;}

    /* === TEMPLATE PICKER === */
    #tmpl-overlay{
      position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.45);
      display:none;
    }
    #tmpl-overlay.show{display:block;}
    #template-popup{
      position:fixed;left:50%;transform:translateX(-50%);
      bottom:calc(60px + env(safe-area-inset-bottom,0px) + 8px);
      z-index:610;background:var(--bg);
      border:1px solid var(--border);border-radius:16px;
      padding:14px 14px 10px;width:min(320px,92vw);
      box-shadow:0 -4px 32px rgba(0,0,0,.5);
      display:none;
    }
    #template-popup.show{display:block;}
    #tmpl-title{margin:0 0 10px;font-size:13px;font-weight:bold;color:var(--accent);}
    .tmpl-btn{
      display:flex;align-items:center;justify-content:space-between;
      width:100%;padding:9px 12px;margin-bottom:6px;
      background:var(--panel);border:1px solid var(--border);border-radius:9px;
      color:var(--text);font-size:12px;cursor:pointer;
    }
    .tmpl-btn span.tmpl-area{color:var(--sub);font-size:11px;}
    .tmpl-cancel{
      display:block;width:100%;padding:8px;margin-top:4px;
      background:transparent;border:1px solid var(--border);border-radius:9px;
      color:var(--sub);font-size:12px;cursor:pointer;
    }

    /* === DRAG / MOVE FEEDBACK === */
    .room-dragging{outline:3px solid var(--accent);}

    /* === CHECKLIST DRAWER === */
    #checklist-tab{
      position:fixed;right:0;top:50%;transform:translateY(-50%);
      background:var(--panel);border:1px solid var(--border);border-right:none;
      border-radius:10px 0 0 10px;padding:10px 6px;z-index:300;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      color:var(--sub);font-size:9px;letter-spacing:.04em;
      transition:background .15s;user-select:none;
    }
    #checklist-tab:active{opacity:.7;}
    #checklist-tab-icon{font-size:16px;}
    #checklist-badge{
      min-width:16px;height:16px;border-radius:8px;
      font-size:9px;font-weight:bold;line-height:16px;text-align:center;
      padding:0 3px;display:none;
    }
    #checklist-tab.badge-warn    #checklist-badge{display:block;background:var(--danger);color:#fff;}
    #checklist-tab.badge-ok      #checklist-badge{display:block;background:#2d8a4e;color:#fff;}
    #checklist-tab.badge-neutral #checklist-badge{display:block;background:var(--sub);color:#fff;}
    /* 補助有りモードボタン */
    #assist-btn{
      font-size:9px;font-weight:bold;letter-spacing:.04em;
      width:auto;min-width:36px;padding:0 6px;
      border:1.5px solid var(--border);color:var(--sub);
    }
    #assist-btn.active{
      background:rgba(41,82,200,.2);border-color:var(--accent);color:var(--accent);
    }
    #checklist-drawer{
      position:fixed;top:44px;right:0;
      width:min(230px,72vw);
      height:calc(100dvh - 44px - 60px - env(safe-area-inset-bottom,0px));
      background:rgba(26,26,46,.92);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      border-left:1px solid var(--border);
      z-index:280;overflow-y:auto;padding:12px 10px;
      transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    }
    #checklist-drawer.open{transform:translateX(0);}
    .cl-section{margin-bottom:12px;}
    .cl-section-label{
      font-size:9px;font-weight:bold;color:var(--sub);letter-spacing:.1em;
      text-transform:uppercase;border-bottom:1px solid var(--border);
      padding-bottom:3px;margin-bottom:5px;
    }
    .cl-item{
      display:flex;align-items:baseline;gap:5px;
      font-size:11px;padding:3px 0;line-height:1.4;
    }
    .cl-item.placed .cl-name{color:#81C784;text-decoration:line-through;opacity:.7;}
    .cl-item.missing .cl-name{color:var(--text);}
    .cl-icon{flex-shrink:0;font-size:11px;}
    .cl-name{flex:1;}
    .cl-area{font-size:9px;color:var(--sub);flex-shrink:0;text-align:right;}
    .cl-total{
      margin-top:10px;padding-top:8px;border-top:1px solid var(--border);
      font-size:11px;color:var(--sub);text-align:center;
    }
    .cl-total strong{color:var(--accent);font-size:13px;}

    /* === TRASH DROP === */
    #t-erase{transition:transform .2s, color .2s;}
    #t-erase.trash-hot{transform:scale(1.55);color:var(--danger);}

    /* === SAVE/LOAD PANEL === */
    #save-panel{
      bottom:calc(60px + env(safe-area-inset-bottom, 0px));left:0;right:0;
      max-height:75vh;overflow-y:auto;
      border-radius:14px 14px 0 0;border-bottom:none;
      padding:14px;transform:translateY(calc(100% + 80px));transition:transform .3s;
      pointer-events:none;
    }
    #save-panel.open{transform:translateY(0);pointer-events:auto;}
    .save-item{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding:10px 0;border-bottom:1px solid var(--border);
    }
    .save-item:last-child{border-bottom:none;}
    .save-item-info{flex:1;min-width:0;}
    .save-item-title{
      font-size:13px;color:var(--text);font-weight:bold;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .save-item-meta{font-size:10px;color:var(--sub);margin-top:2px;}
    .save-item-actions{display:flex;gap:5px;flex-shrink:0;}

    /* === SYSTEM CHECK === */
    .chk-section{margin-bottom:16px;}
    .chk-section-title{
      font-size:10px;font-weight:bold;color:var(--sub);letter-spacing:.1em;
      text-transform:uppercase;border-bottom:1px solid var(--border);
      padding-bottom:4px;margin-bottom:8px;
    }
    .chk-item{display:flex;align-items:baseline;gap:6px;padding:3px 0;font-size:12px;}
    .chk-item .chk-icon{flex-shrink:0;font-size:13px;}
    .chk-item .chk-name{flex:1;color:var(--text);}
    .chk-item .chk-detail{font-size:10px;color:var(--sub);}
    .chk-item.ok   .chk-name{color:#81C784;}
    .chk-item.ng   .chk-name{color:#EF9A9A;}
    .chk-item.warn .chk-name{color:#FFD54F;}
    .chk-verdict{
      margin-top:16px;padding:12px;border-radius:10px;text-align:center;
      font-size:14px;font-weight:bold;
    }
    .chk-verdict.pass{background:rgba(76,175,80,.2);color:#81C784;border:1px solid rgba(76,175,80,.4);}
    .chk-verdict.fail{background:rgba(229,115,115,.15);color:#EF9A9A;border:1px solid rgba(229,115,115,.4);}
    .chk-verdict.warn{background:rgba(255,213,79,.12);color:#FFD54F;border:1px solid rgba(255,213,79,.4);}

    /* === ROTATE BUTTON === */
    #rotate-btn{
      position:fixed;display:none;align-items:center;gap:4px;
      background:var(--accent);color:#fff;border:none;border-radius:20px;
      padding:6px 14px;font-size:13px;font-weight:bold;
      z-index:300;cursor:pointer;white-space:nowrap;
      transform:translateX(-50%);
      box-shadow:0 2px 8px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <a href="index.html" class="icon-btn" title="課題一覧へ戻る" style="text-decoration:none;font-size:14px;">⌂</a>
  <span class="app-title">エスキスアプリ</span>
  <button class="icon-btn" id="cond-btn" title="課題条件">📋</button>
  <button class="icon-btn" id="guide-btn" title="ガイドライン追加">📐</button>
  <button class="icon-btn" id="store-btn" title="保存 / ロード">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/>
      <polyline points="7 3 7 8 15 8"/>
    </svg>
  </button>
  <button class="icon-btn" id="clear-btn" title="全消去">🗑️</button>
  <button class="icon-btn" id="assist-btn" title="補助有りモード ON/OFF" onclick="toggleAssistMode()">補助</button>
  <span id="zoom-info">100%</span>
</div>

<!-- CANVAS -->
<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<!-- FLOATING -->
<div id="area-overlay">
  <div class="total" id="area-total">0 m²</div>
  <div id="area-list"></div>
</div>
<button id="undo-btn" title="元に戻す">↩</button>
<button id="redo-btn" title="やり直し">↪</button>

<!-- BOTTOM TOOLBAR -->
<div id="toolbar">
  <button class="tbtn" id="t-wall" data-tool="wall">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="4" y1="20" x2="20" y2="4"/>

function normalizeRoomName(name) {
  return (name || '').normalize('NFKC')
    .replace(/子供/g, '子ども')   // 表記ゆれ許容
    .toLowerCase()
    .replace(/[\s　]/g, '');
}

function getFloorForRoom(room) {
  const cx = room.x + room.w / 2;
  const {x, w} = state.site;
  const f2x = get2Fx();
  if(is2Story() && cx >= f2x - w * 0.1 && cx <= f2x + w * 1.1) return '2F';
  if(cx >= x - w * 0.1 && cx <= x + w * 1.1) return '1F';
  return '外構';
}

function getChecklistData() {
  // 要求室を DOM から読む
  const reqItems = [...document.querySelectorAll('#req-list .req-item')].map(el => ({
    name:  el.querySelector('[data-field="name"]')?.value?.trim() || '',
    floor: el.querySelector('[data-field="floor"]')?.value || 'どちらでも',
    area:  el.querySelector('[data-field="area"]')?.value?.trim() || '',
    notes: [...el.querySelectorAll('.req-note-input')].map(i => i.value.trim()).filter(Boolean),
  })).filter(r => r.name);

  // 外構条件
  const extItems = [...document.querySelectorAll('#ext-list .ext-item')].map(el => ({
    name:  el.querySelector('[data-field="type"]')?.value?.trim() || '',
    floor: '外構',
    area:  el.querySelector('[data-field="note"]')?.value?.trim() || '',
  })).filter(e => e.name);

  // セクション分類
  const sections = [
    {label:'1階',        floor:'1F',       items: reqItems.filter(r => r.floor === '1F')},
    {label:'2階',        floor:'2F',       items: reqItems.filter(r => r.floor === '2F')},
    {label:'階数指定なし', floor:'any',   items: reqItems.filter(r => r.floor !== '1F' && r.floor !== '2F')},
    {label:'外構',       floor:'外構',     items: extItems},
  ].filter(s => s.items.length > 0);

  // 各要求室が配置済みか照合
  sections.forEach(sec => {
    sec.items.forEach(req => {
      const normReq = normalizeRoomName(req.name);
      req.placed = state.rooms.some(r => {
        if(normalizeRoomName(r.name) !== normReq) return false;
        if(sec.floor === '外構') return true; // 外構は位置問わず名前一致で OK
        const rf = getFloorForRoom(r);
        if(sec.floor === '1F')  return rf === '1F';
        if(sec.floor === '2F')  return rf === '2F';
        return true; // any
      });
    });
  });
  return sections;
}

function toggleAssistMode() {
  assistMode = !assistMode;
  const btn = document.getElementById('assist-btn');
  if(btn) btn.classList.toggle('active', assistMode);
  showSnack(assistMode ? '補助有りモード ON — 境界線チェックが有効になりました' : '補助有りモード OFF');
  refreshChecklistBadge();
  render();
}

function refreshChecklistBadge() {
  const sections = getChecklistData();
  const total = sections.reduce((a, s) => a + s.items.length, 0);
  const done  = sections.reduce((a, s) => a + s.items.filter(i => i.placed).length, 0);
  const badge = document.getElementById('checklist-badge');
  const tab   = document.getElementById('checklist-tab');
  if(!badge || !tab) return;
  const rem = total - done;
  if(assistMode) {
    // 補助有りモード: 未配置数をバッジ表示
    badge.textContent = rem > 0 ? rem : (total > 0 ? '✓' : '');
    tab.classList.toggle('badge-warn',    rem > 0 && total > 0);
    tab.classList.toggle('badge-ok',      rem === 0 && total > 0);
    tab.classList.remove('badge-neutral');
  } else {
    // 通常モード: 総室数をグレーで表示
    badge.textContent = total > 0 ? total : '';
    tab.classList.remove('badge-warn', 'badge-ok');
    tab.classList.toggle('badge-neutral', total > 0);
  }
  // ドロワーが開いていれば中身も更新
  if(document.getElementById('checklist-drawer').classList.contains('open')) {
    renderChecklist(sections);
  }
  updateSysCheckBtn();
}

function renderChecklist(sections) {
  const body = document.getElementById('checklist-body');
  if(!body) return;
  const total = sections.reduce((a, s) => a + s.items.length, 0);
  const done  = sections.reduce((a, s) => a + s.items.filter(i => i.placed).length, 0);
  if(total === 0) {
    body.innerHTML = '<p style="font-size:11px;color:var(--sub);text-align:center;padding:20px 0">課題を選択すると<br>チェックリストが表示されます</p>';
    return;
  }
  let html = '';
  // モードインジケーター
  if(assistMode) {
    html += `<div style="font-size:9px;color:var(--accent);margin-bottom:8px;padding:3px 6px;border:1px solid var(--accent);border-radius:3px;font-weight:bold;letter-spacing:.04em;">🔧 補助有りモード</div>`;
  }
  sections.forEach(sec => {
    html += `<div class="cl-section">
      <div class="cl-section-label">${sec.label}</div>`;
    sec.items.forEach(item => {
      let icon, cls;
      if(assistMode) {
        icon = item.placed ? '✅' : '❌';
        cls  = item.placed ? 'placed' : 'missing';
      } else {
        icon = '□';
        cls  = 'missing';
      }
      const notesHtml = (item.notes && item.notes.length)
        ? `<div class="cl-notes">${item.notes.map(n => `<div class="cl-note">・${escHtml(n)}</div>`).join('')}</div>`
        : '';
      html += `<div class="cl-item ${cls}">
        <div class="cl-item-main">
          <span class="cl-icon">${icon}</span>
          <span class="cl-name">${escHtml(item.name)}</span>
          ${item.area ? `<span class="cl-area">${escHtml(item.area)}</span>` : ''}
        </div>
        ${notesHtml}
      </div>`;
    });
    html += '</div>';
  });
  // 補助モード: 境界線チェックセクション
  if(assistMode) {
    html += renderBoundarySection(checkBoundaryViolations());
    html += `<div class="cl-total"><strong>${done}</strong> / ${total} 室完了</div>`;
  } else {
    html += `<div class="cl-total">全 <strong>${total}</strong> 室</div>`;
  }
  body.innerHTML = html;
}

function getZoningSlope() {

}
